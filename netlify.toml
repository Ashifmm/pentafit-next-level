# Nitro's `netlify` preset (configured in vite.config.ts) emits a Netlify
# Function for SSR and a static client bundle. It also writes its own
# `_redirects` so unmatched routes fall through to the SSR function.

[build]
  command = "npm run build"
  publish = "dist/client"

[build.environment]
  NODE_VERSION = "20"
